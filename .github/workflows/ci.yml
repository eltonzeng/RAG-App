name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Unit + mocked tests only — no live DB or API keys required. The full
        # retrieval/generation eval (evals/run.py) needs ParadeDB + API keys and
        # runs as a separate manual/nightly job.
        run: pytest tests/ -v
