services:
  postgres:
    # ParadeDB ships pg_search (true BM25) alongside pgvector, so both semantic
    # and lexical search run in-database.
    # TODO: pin to a specific verified tag (e.g. paradedb/paradedb:0.15.x) for
    # reproducibility once confirmed against the registry.
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
